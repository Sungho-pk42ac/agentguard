name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:behavior
      - run: npm run test:docs
      - run: npm run build
  control-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            control-plane/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: control-plane
      - run: npm run typecheck
        working-directory: control-plane
      - run: npm test
        working-directory: control-plane
