name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:behavior
      - run: npm run build
      - name: Version guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "workflow_dispatch rehearsal: would publish version $(node -p "require('./package.json').version") (publish skipped)"
          else
            [ "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")" ] || exit 1
          fi
      - name: Update npm CLI for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public
