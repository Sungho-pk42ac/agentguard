name: AgentGuard
description: Team-ready PR diff gate for AI-agent secrets, risky MCP/config changes, and SARIF evidence.
inputs:
  base-sha:
    description: Base commit SHA for the pull request diff.
    required: true
  head-sha:
    description: Head commit SHA for the pull request diff.
    required: true
  report-path:
    description: Markdown report file path to write and publish as a PR comment/artifact.
    required: false
    default: agent-risk-report.md
  json-path:
    description: JSON findings file path to write.
    required: false
    default: agent-risk-findings.json
  sarif-path:
    description: SARIF file path to write for GitHub code scanning upload.
    required: false
    default: agentguard.sarif
  policy-path:
    description: Optional agent-policy.yaml/json path.
    required: false
    default: ''
  package-version:
    description: npm package version or dist-tag to install.
    required: false
    default: latest
  fail-on:
    description: Gate threshold. Use block to fail only the score-based BLOCK verdict, review to fail any non-pass verdict, or never to report only.
    required: false
    default: block
outputs:
  conclusion:
    description: pass, review, or block based on AgentGuard findings.
    value: ${{ steps.scan.outputs.conclusion }}
  report-path:
    description: Path to the markdown AgentGuard report artifact.
    value: ${{ steps.scan.outputs.report-path }}
  json-path:
    description: Path to the JSON AgentGuard findings artifact.
    value: ${{ steps.scan.outputs.json-path }}
  sarif-path:
    description: Path to the SARIF AgentGuard artifact.
    value: ${{ steps.scan.outputs.sarif-path }}
runs:
  using: composite
  steps:
    - name: Scan PR diff
      id: scan
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base-sha }}
        HEAD_SHA: ${{ inputs.head-sha }}
        REPORT_PATH: ${{ inputs.report-path }}
        JSON_PATH: ${{ inputs.json-path }}
        SARIF_PATH: ${{ inputs.sarif-path }}
        POLICY_PATH: ${{ inputs.policy-path }}
        FAIL_ON: ${{ inputs.fail-on }}
        PACKAGE_VERSION: ${{ inputs.package-version }}
      run: |
        set -euo pipefail

        report_path="$REPORT_PATH"
        json_path="$JSON_PATH"
        sarif_path="$SARIF_PATH"
        policy_path="$POLICY_PATH"
        fail_on="$FAIL_ON"
        package_version="$PACKAGE_VERSION"
        diff_path="${RUNNER_TEMP:-/tmp}/agentguard-pr.diff"

        case "$fail_on" in
          block|review|never) ;;
          *)
            echo "fail-on must be one of: block, review, never" >&2
            exit 2
            ;;
        esac

        if [[ ! "$BASE_SHA" =~ ^([0-9a-fA-F]{40}|[0-9a-fA-F]{64})$ ]]; then echo "base-sha must be a 40 or 64-character commit SHA" >&2; exit 2; fi
        if [[ ! "$HEAD_SHA" =~ ^([0-9a-fA-F]{40}|[0-9a-fA-F]{64})$ ]]; then echo "head-sha must be a 40 or 64-character commit SHA" >&2; exit 2; fi

        validate_artifact_path() {
          local candidate="$1"
          local input_name="$2"
          local normalized="${candidate//\\//}"
          if [[ "$candidate" == *$'\n'* || "$candidate" == *$'\r'* || "$candidate" == *$'\t'* || "$candidate" =~ [[:cntrl:]] ]]; then
            echo "$input_name: artifact paths must not contain control characters" >&2
            exit 2
          fi
          case "$normalized" in
            /*|[A-Za-z]:*)
              echo "$input_name: artifact paths must be relative and stay inside the workspace" >&2
              exit 2
              ;;
            ../*|*/../*|*/..|..)
              echo "$input_name: artifact paths must be relative and stay inside the workspace" >&2
              exit 2
              ;;
          esac
        }

        validate_distinct_artifact_paths() {
          local report_candidate="${1//\\//}"
          local json_candidate="${2//\\//}"
          local sarif_candidate="${3//\\//}"
          if [[ "$report_candidate" == "$json_candidate" || "$report_candidate" == "$sarif_candidate" || "$json_candidate" == "$sarif_candidate" ]]; then
            echo "artifact paths must be distinct" >&2
            exit 2
          fi
        }

        validate_policy_path() {
          local candidate="$1"
          local normalized="${candidate//\\//}"
          if [[ -z "$candidate" ]]; then
            return 0
          fi
          if [[ "$candidate" == *$'\n'* || "$candidate" == *$'\r'* || "$candidate" == *$'\t'* || "$candidate" =~ [[:cntrl:]] ]]; then
            echo "policy-path: policy paths must not contain control characters" >&2
            exit 2
          fi
          case "$normalized" in
            /*|[A-Za-z]:*)
              echo "policy-path: policy paths must be relative and stay inside the workspace" >&2
              exit 2
              ;;
            ../*|*/../*|*/..|..)
              echo "policy-path: policy paths must be relative and stay inside the workspace" >&2
              exit 2
              ;;
          esac
        }

        validate_package_version() {
          local candidate="$1"
          case "$candidate" in
            ''|*[^0-9A-Za-z._~-]*)
              echo "package-version must be a safe npm version or dist-tag" >&2
              exit 2
              ;;
          esac
        }

        validate_artifact_path "$report_path" "report-path"
        validate_artifact_path "$json_path" "json-path"
        validate_artifact_path "$sarif_path" "sarif-path"
        validate_policy_path "$policy_path"
        validate_distinct_artifact_paths "$report_path" "$json_path" "$sarif_path"

        rm -f -- "$report_path" "$json_path" "$sarif_path"
        mkdir -p -- "$(dirname -- "$report_path")"
        mkdir -p -- "$(dirname -- "$json_path")"
        mkdir -p -- "$(dirname -- "$sarif_path")"

        git diff --no-ext-diff --unified=0 "$BASE_SHA" "$HEAD_SHA" > "$diff_path"

        policy_args=()
        if [[ -n "$policy_path" ]]; then
          policy_args=(--policy "$policy_path")
        fi
        validate_package_version "$package_version"
        agentguard_cmd=(npx --yes "@pk42ac/agentguard@${package_version}")

        set +e
        "${agentguard_cmd[@]}" scan-diff "${policy_args[@]}" --json --out "$json_path" < "$diff_path"
        json_status=$?
        "${agentguard_cmd[@]}" scan-diff "${policy_args[@]}" --sarif --out "$sarif_path" < "$diff_path"
        sarif_status=$?
        "${agentguard_cmd[@]}" scan-diff "${policy_args[@]}" --out "$report_path" < "$diff_path"
        markdown_status=$?
        set -e

        if [[ $json_status -gt 1 || $sarif_status -gt 1 || $markdown_status -gt 1 ]]; then
          echo "AgentGuard failed to scan the PR diff" >&2
          exit 2
        fi

        if [[ ! -s "$json_path" ]]; then
          echo "AgentGuard did not create the JSON findings artifact" >&2
          exit 2
        fi
        if [[ ! -s "$sarif_path" ]]; then
          echo "AgentGuard did not create the SARIF artifact" >&2
          exit 2
        fi
        if [[ ! -s "$report_path" ]]; then
          echo "AgentGuard did not create the markdown report artifact" >&2
          exit 2
        fi

        conclusion=$(node --input-type=module -e "
          import { readFileSync } from 'node:fs'
          const findings = JSON.parse(readFileSync(process.argv[1], 'utf8'))
          const weight = { low: 1, medium: 2, high: 3, critical: 4 }
          const score = findings
            .filter((finding) => !finding.advisory)
            .reduce((sum, finding) => sum + (weight[finding.severity] ?? 0), 0)
          if (score === 0) console.log('pass')
          else if (score >= 8) console.log('block')
          else console.log('review')
        " -- "$json_path")

        {
          echo "conclusion=$conclusion"
          echo "report-path=$report_path"
          echo "json-path=$json_path"
          echo "sarif-path=$sarif_path"
        } >> "$GITHUB_OUTPUT"

        cat "$report_path" >> "$GITHUB_STEP_SUMMARY"

        if [[ "$conclusion" == "block" && "$fail_on" =~ ^(block|review)$ ]]; then
          echo "AgentGuard found BLOCK findings; failing this check." >&2
          exit 1
        fi
        if [[ "$conclusion" == "review" && "$fail_on" == "review" ]]; then
          echo "AgentGuard found REVIEW findings; failing this check because fail-on=review." >&2
          exit 1
        fi
