# AgentGuard self-host topology (plan §M5): proxy + web + api + postgres.
#
#   docker compose --env-file deploy/.env -f deploy/docker-compose.yml up -d
#
# One public origin (`proxy`) puts `web` (static console) and `api`
# (control-plane) behind the SAME host:port, which is what makes the
# control-plane's session + CSRF cookies first-party for the browser — see
# deploy/Caddyfile. `web` and `api` publish no host ports themselves; only
# `proxy` is reachable from outside this compose network. See
# docs/self-hosting.md for the full walkthrough and deploy/.env.example for
# every variable referenced below.

services:
  proxy:
    image: caddy:2-alpine
    depends_on:
      - web
      - api
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      # Least-privilege runtime role (see deploy/postgres-init/001-roles.sh).
      DATABASE_URL: postgres://agentguard_api:${POSTGRES_API_PASSWORD}@postgres:5432/${POSTGRES_DB:-agentguard}
      # Elevated owner role, used ONCE at boot for schema migration only —
      # see deploy/api-entrypoint.mjs.
      MIGRATE_DATABASE_URL: postgres://${POSTGRES_USER:-agentguard_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agentguard}
      AGENTGUARD_CP_VIEWER_KEYS: ${AGENTGUARD_CP_VIEWER_KEYS:-{}}
      AGENTGUARD_CP_WEBHOOK: ${AGENTGUARD_CP_WEBHOOK:-}
      AGENTGUARD_CP_STALE_HOURS: ${AGENTGUARD_CP_STALE_HOURS:-48}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentguard}
      POSTGRES_USER: ${POSTGRES_USER:-agentguard_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_API_PASSWORD: ${POSTGRES_API_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
