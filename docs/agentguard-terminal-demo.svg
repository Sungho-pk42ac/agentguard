<svg width="920" height="560" viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentGuard 대시보드 터미널 스크린샷</title>
  <desc id="desc">README용 터미널 스크린샷으로, 맨 agentguard 실행 시 열리는 tokscale 스타일 관리자 대시보드가 상단 5개 탭, 서피스별 findings 바 차트와 PASS/REVIEW/BLOCK verdict 배지, 심각도 색상 findings 리스트, 하단 단축키/상태 바를 표시하는 모습을 보여준다.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="100%" stop-color="#0b1b2f"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="920" height="560" rx="14" fill="url(#bg)"/>
  <rect x="14" y="14" width="892" height="40" rx="8" fill="#0f2438"/>
  <circle cx="38" cy="34" r="7" fill="#ff5f56"/>
  <circle cx="62" cy="34" r="7" fill="#ffbd2e"/>
  <circle cx="86" cy="34" r="7" fill="#27c93f"/>
  <text x="112" y="39" fill="#9ca3af" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">AgentGuard 대시보드 · agentguard</text>

  <!-- tab bar -->
  <text x="28" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">
    <tspan fill="#38bdf8" font-weight="700">agentguard  </tspan><tspan fill="#0b1b2f" style="background:#38bdf8"> Overview </tspan><tspan fill="#38bdf8"> Overview </tspan><tspan fill="#9ca3af">  Agents   Credentials   Posture   Offboard</tspan><tspan fill="#f87171" font-weight="700">      BLOCK · 3 critical</tspan>
  </text>
  <line x1="28" y1="98" x2="892" y2="98" stroke="#1f3a56"/>

  <!-- hero bar chart: findings by surface -->
  <text x="28" y="128" fill="#e5e7eb" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">Findings by surface</text>
  <text x="28" y="156" fill="#f87171" font-family="ui-monospace, monospace" font-size="14">shell-rc        ████████████████████  4</text>
  <text x="28" y="180" fill="#f87171" font-family="ui-monospace, monospace" font-size="14">project-file    ██████████████  3</text>
  <text x="28" y="204" fill="#c084fc" font-family="ui-monospace, monospace" font-size="14">agent-config    ██████████  2</text>
  <text x="28" y="228" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="14">npm-global      █████  1</text>
  <text x="28" y="252" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="14">ai-tool-dir     █████  1</text>

  <!-- findings list -->
  <rect x="24" y="270" width="872" height="150" rx="8" fill="#0d1f33" stroke="#1f3a56"/>
  <text x="44" y="296" fill="#e5e7eb" font-family="ui-monospace, monospace" font-size="14">Credentials — 8/8   (↑↓ scroll · f severity · enter detail)</text>
  <text x="44" y="324" fill="#f87171" font-family="ui-monospace, monospace" font-size="14">› [critical] shell-rc       ~/.bashrc</text>
  <text x="44" y="348" fill="#f87171" font-family="ui-monospace, monospace" font-size="14">  [critical] project-file   repo/.env</text>
  <text x="44" y="372" fill="#c084fc" font-family="ui-monospace, monospace" font-size="14">  [high]     agent-config   claude_desktop_config.json</text>
  <text x="44" y="396" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="14">  [medium]   npm-global     @openai/codex</text>

  <!-- footer keybind / status bar -->
  <line x1="28" y1="440" x2="892" y2="440" stroke="#1f3a56"/>
  <text x="28" y="466" fill="#9ca3af" font-family="ui-monospace, monospace" font-size="13">[tab] view  [↑↓] scroll  [f] filter  [enter] detail  [o] offboard  [r] rescan  [q] quit</text>
  <text x="28" y="490" fill="#e5e7eb" font-family="ui-monospace, monospace" font-size="14">8 findings · 3 critical · last scan 6s ago</text>
  <text x="28" y="514" fill="#86efac" font-family="ui-monospace, monospace" font-size="13">[o] offboarding sweep: approval required — deletions move to ~/.agentguard/trash (recoverable)</text>
  <text x="28" y="538" fill="#9ca3af" font-family="ui-monospace, monospace" font-size="13">JSON/SARIF/machine fields는 English-compatible 계약 유지 · non-TTY는 기존 도움말</text>
</svg>
