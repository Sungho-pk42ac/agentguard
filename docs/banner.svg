<svg width="920" height="260" viewBox="0 0 920 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AgentGuard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1826"/>
      <stop offset="1" stop-color="#090e17"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#1c6b7e" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#1c6b7e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s-shield" x1="64" y1="40" x2="192" y2="222" gradientUnits="userSpaceOnUse">
