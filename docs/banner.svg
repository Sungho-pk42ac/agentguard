    <path d="M52 126 H204" stroke="#e8a33d" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
    <path d="M52 126 H132" stroke="#e8a33d" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M128 92 L96 152" stroke="#6fd3e2" stroke-width="6" stroke-linecap="round"/>
    <path d="M128 92 L128 152" stroke="#6fd3e2" stroke-width="6" stroke-linecap="round"/>
    <path d="M128 92 L162 152" stroke="#6fd3e2" stroke-width="6" stroke-linecap="round"/>
    <circle cx="128" cy="86" r="15" fill="url(#s-node)"/>
    <circle cx="96" cy="158" r="12" fill="url(#s-node)"/>
    <circle cx="128" cy="158" r="12" fill="url(#s-node)"/>
    <circle cx="162" cy="158" r="12" fill="#e8a33d"/>
    <circle cx="162" cy="158" r="18" fill="none" stroke="#e8a33d" stroke-width="2.5" opacity="0.55"/>
  </g>

  <!-- wordmark -->
  <text x="234" y="126" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="66" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#eef4f8">Agent</tspan><tspan fill="#7fdbe8">Guard</tspan>
  </text>
  <text x="238" y="166" font-family="'Malgun Gothic','Segoe UI',Arial,sans-serif" font-size="21" font-weight="600" fill="#93a7b8">로컬 AI 에이전트 생애주기 보안 스캐너</text>
  <text x="238" y="196" font-family="'Segoe UI',Arial,sans-serif" font-size="15" fill="#5f7688">Secrets · MCP · transcripts · PR diffs · SARIF — AgentOps security scanner</text>

  <!-- chips -->
  <g font-family="'Consolas','Segoe UI',monospace" font-size="13" font-weight="600">
    <rect x="238" y="214" width="96" height="26" rx="13" fill="#122735" stroke="#20465a"/><text x="286" y="231" fill="#7fdbe8" text-anchor="middle">scan-files</text>
    <rect x="342" y="214" width="92" height="26" rx="13" fill="#122735" stroke="#20465a"/><text x="388" y="231" fill="#7fdbe8" text-anchor="middle">scan-diff</text>
    <rect x="442" y="214" width="92" height="26" rx="13" fill="#122735" stroke="#20465a"/><text x="488" y="231" fill="#7fdbe8" text-anchor="middle">scan-mcp</text>
    <rect x="542" y="214" width="78" height="26" rx="13" fill="#122735" stroke="#20465a"/><text x="581" y="231" fill="#7fdbe8" text-anchor="middle">posture</text>
    <rect x="628" y="214" width="118" height="26" rx="13" fill="#1c2a16" stroke="#3c5a24"/><text x="687" y="231" fill="#b6d97a" text-anchor="middle">offboard sweep</text>
