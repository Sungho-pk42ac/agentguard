  <rect x="0" y="0" width="920" height="260" rx="26" fill="url(#bg)"/>
  <rect x="0" y="0" width="920" height="260" rx="26" fill="url(#glow)"/>
  <rect x="1.5" y="1.5" width="917" height="257" rx="24.5" fill="none" stroke="#1f3a4d" stroke-width="1.5"/>

  <!-- icon -->
  <g transform="translate(48,42) scale(0.68)">
