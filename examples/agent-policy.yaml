deny_read:
  - .env*
  - ~/.ssh/**
  - auth.json
  - credentials.json
  - node_modules/**
  - .git/**
deny_commands:
  - rm -rf
  - git push --force
  - gh secret view
require_approval:
  - deploy
  - db:migrate
  - vercel --prod
mcp:
  deny_servers:
    - filesystem
    - postgres
    - github
  require_approval_tools:
    - github.merge_pull_request
